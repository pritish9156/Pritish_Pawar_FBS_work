<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Clone</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <h4>Instagram</h4>
    <a href="#"><i class="bi bi-house"></i> Home</a>
    <a href="#"><i class="bi bi-search"></i> Search</a>
    <a href="#"><i class="bi bi-compass"></i> Explore</a>
    <a href="#"><i class="bi bi-play-circle"></i> Reels</a>
    <a href="#"><i class="bi bi-chat"></i> Messages</a>
    <a href="#"><i class="bi bi-person"></i> Profile</a>
  </div>

  <!-- Feed -->
  <div class="feed">

    <!-- Post 1 -->
    <div class="post">
      <div class="post-header">
        <img src="https://i.pravatar.cc/40?img=1" class="profile-pic">
        <span class="username">user_1</span>
      </div>
      <img src="https://picsum.photos/600/400?random=1">
      <div class="post-actions">
        <i class="bi bi-heart"></i>
        <i class="bi bi-chat"></i>
        <i class="bi bi-send"></i>
      </div>
      <div class="likes">100 likes</div>
      <div class="caption"><b>user_1</b> Nice post 👍</div>
    </div>

    <!-- Post 2 -->
    <div class="post">
      <div class="post-header">
        <img src="https://i.pravatar.cc/40?img=2" class="profile-pic">
        <span class="username">user_2</span>
      </div>
      <img src="https://picsum.photos/600/400?random=2">
      <div class="post-actions">
        <i class="bi bi-heart"></i>
        <i class="bi bi-chat"></i>
        <i class="bi bi-send"></i>
      </div>
      <div class="likes">250 likes</div>
      <div class="caption"><b>user_2</b> Amazing 🔥</div>
    </div>

  </div>

</body>
</html>
