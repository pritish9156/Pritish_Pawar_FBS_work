<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <!-- Internal CSS -->

    <style>
        table,tr,th,td{
            border: 2px solid blue;
            text-align: center;
            border-collapse: collapse;
        }

    </style>

    <div>
        <!-- Tables -->

        <table style="width: 50%;"> <!-- opening table -->

            <tr> <!-- table row --> <!--first row -->
                <th>Roll Number</th>
                <th>Subject</th>
                <th>Marks</th>
            </tr>

            <tr>
                <td>1</td>
                <td>Maths</td>
                <td>55</td>
            </tr>

             <tr>
                <td>2</td>
                <td>English</td>
                <td>55</td>
            </tr>

             <tr>
                <td>3</td>
                <td>Science</td>
                <td>55</td>
            </tr>
            
        </table>

        <br>
        <br>

        <table style="width: 50%;"> <!-- opening table -->

            <tr> <!-- table row --> <!--first row -->
                <th colspan="2">A</th>
                <th>C</th>
            </tr>

            <tr>
                <td rowspan="3">1</td>
                <td colspan="2">1</td>
            </tr>
               
             <tr>
                 <td>2</td>
                <td>2</td>
            </tr>

             <tr>
               <td>3</td>
                <td>3</td>
            </tr>
            
        </table>
    </div>
</body>
</html>
