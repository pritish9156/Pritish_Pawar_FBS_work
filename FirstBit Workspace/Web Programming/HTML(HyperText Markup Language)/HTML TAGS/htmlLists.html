<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists in HTML</title>
</head>
<body>
    <div>

        <h1>ordered List</h1>
        <ol type="I">
            <li>HTML</li>
            <li>CSS</li>
            <li>JS</li>
        </ol>

        <ol type="A">
            <li>HTML</li>
            <li>CSS</li>
            <li>JS</li>
        </ol>

        <ol>
            <li>HTML</li>
            <li>CSS</li>
            <li>JS</li>
        </ol>

        <h1>unordered List</h1>
        <ul>
            <li>HTML</li>
            <li>CSS</li>
            <li>JS</li>
        </ul>

        <ul style="list-style-type: armenian;">
            <li>HTML</li>
            <li>CSS</li>
            <li>JS</li>
        </ul>

        <ul style="list-style-type: circle;">
            <li>HTML</li>
            <li>CSS</li>
            <li>JS</li>
        </ul>

    </div>
</body>
</html>
