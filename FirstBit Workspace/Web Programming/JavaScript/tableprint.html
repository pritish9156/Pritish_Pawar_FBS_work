<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table{
            border:2px solid red;
        }
        .MainContainer{
            display: flex;
            flex-wrap: wrap;
            gap:10px;
        }
        .even{
            background-color: lightblue;
        }
        .odd{
            background-color: lightgreen;
        }
    </style>
    <script>
        function printTable(){
            a=parseInt(document.getElementById("num1").value);

            str="<div class='MainContainer'>";

            for(j=a; j<a+30; j++){
                
                if(j%2==0){
                    cname="even";
                }
                else{
                    cname="odd";
                }
                
                tb=`<div class=${cname}><table>`
                for(i=1;i<=10;i++){
                    tb=tb+`<tr><td>${j}</td><td>x</td><td>${i}</td><td>=</td><td>${j*i}</td></tr>`
                }
                tb=tb+"</table></div>"

                str=str+tb;
            }

            str=str+"</div>";
            document.getElementById("result").innerHTML = str;
        }
    </script>
</head>
<body>
    Enter a number <input type="text" id="num1">
    <br>
    <button onclick="printTable()">Print Table</button>
    <br>
    <span id="result"></span>
</body>
</html>
